# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: PullRequest Merge Validation

on:
  pull_request:
    branches: [ "*" ]

permissions:
  contents: read

jobs:
  build-and-test:

    runs-on: windows-2022

    defaults:
      run:
        working-directory: src

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.x
    - name: Restore workloads
      run: dotnet workload restore EventLogExpert.slnx
    - name: Restore dependencies
      run: dotnet restore EventLogExpert.slnx
    - name: Build
      run: dotnet build EventLogExpert.slnx --no-restore
    - name: Test
      run: dotnet test EventLogExpert.slnx --no-build --verbosity normal
